# pnpm 10+ reads settings from here (the package.json "pnpm" field is no longer read).
# Allow these dependencies to run their install/build scripts.
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  oxc-resolver: true
  protobufjs: true
  unrs-resolver: true
patchedDependencies:
  '@sneat/auth-ui@0.1.4': patches/@sneat__auth-ui@0.1.4.patch
