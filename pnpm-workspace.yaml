# pnpm 10+ reads settings from here (the package.json "pnpm" field is no longer read).
# Allow these dependencies to run their install/build scripts.
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  oxc-resolver: true
  protobufjs: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@sneat/api@0.5.0'
  - '@sneat/auth-core@0.5.0'
  - '@sneat/auth-models@0.5.0'
  - '@sneat/auth-ui@0.5.0'
  - '@sneat/components@0.5.0'
  - '@sneat/contactus-core@0.5.0'
  - '@sneat/core@0.5.0'
  - '@sneat/data@0.5.0'
  - '@sneat/datagrid@0.5.0'
  - '@sneat/dto@0.5.0'
  - '@sneat/grid@0.5.0'
  - '@sneat/logging@0.5.0'
  - '@sneat/space-models@0.5.0'
  - '@sneat/space-services@0.5.0'
  - '@sneat/ui@0.5.0'
