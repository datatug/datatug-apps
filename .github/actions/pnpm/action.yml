name: 'PNPM install'

description: 'Installs PNPM & runs `pnpm install`'

runs:
  using: 'composite'
  steps:
    - run: git rev-parse HEAD
      shell: sh

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup NodeJS
      uses: actions/setup-node@v6
      with:
        cache: 'pnpm'
        node-version: '24'

    - run: pnpm --version
      shell: sh

    - name: Install dependencies
      run: pnpm install
      shell: sh
